version: '3.8'

# 多版本 MySQL 服务配置
# 使用 profiles 来管理不同版本的 MySQL 实例
# 启动方式：
#   - MySQL 8.0 (默认): docker-compose up -d
#   - MySQL 5.7: docker-compose --profile mysql-5.7 up -d
#   - MySQL 8.3: docker-compose --profile mysql-8.3 up -d
#   - 全部版本：docker-compose --profile all up -d

services:
  # MySQL 8.0 - 默认版本（无 profile 时默认启动）
  mysql:
    image: mysql:8.0
    container_name: sql-analyzer-mysql-8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: test_db
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
      TZ: Asia/Shanghai
    ports:
      - "0.0.0.0:3306:3306"
    volumes:
      # 挂载初始化脚本目录
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
      # 持久化数据（可选，如果需要保留数据）
      - mysql_8.0_data:/var/lib/mysql
      # 挂载慢查询日志目录
      - ./docker/mysql/logs:/var/log/mysql
    command: 
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      # 启用 InnoDB 锁日志
      - --innodb-status-output=ON
      - --innodb-status-output-locks=ON
      # 打印所有死锁信息到错误日志（MySQL 8.0.13+）
      - --innodb-print-all-deadlocks=ON
      # 锁等待超时时间（秒，默认 50）
      - --innodb-lock-wait-timeout=50
      # 启用错误日志并指定路径（死锁和锁等待超时会记录在这里）
      - --log-error=/var/log/mysql/error.log
      # 启用错误日志详细输出（包含锁相关信息）
      - --log-error-verbosity=3
      # 启用慢查询日志
      - --slow-query-log=1
      - --long-query-time=1
      - --slow-query-log-file=/var/log/mysql/slow-query.log
      # 记录未使用索引的查询
      - --log-queries-not-using-indexes=1
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MySQL 5.7 - 旧版本支持
  mysql-5.7:
    profiles: ["mysql-5.7", "all"]
    image: mysql:5.7
    container_name: sql-analyzer-mysql-5.7
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: test_db
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
      TZ: Asia/Shanghai
    ports:
      - "0.0.0.0:3307:3306"
    volumes:
      # 挂载初始化脚本目录
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
      # 持久化数据
      - mysql_5.7_data:/var/lib/mysql
      # 挂载慢查询日志目录
      - ./docker/mysql/logs:/var/log/mysql-5.7
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      # 启用慢查询日志
      - --slow-query-log=1
      - --long-query-time=1
      - --slow-query-log-file=/var/log/mysql/slow-query-5.7.log
      # 记录未使用索引的查询
      - --log-queries-not-using-indexes=1
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MySQL 8.3 - 最新版本
  mysql-8.3:
    profiles: ["mysql-8.3", "all"]
    image: mysql:8.3
    container_name: sql-analyzer-mysql-8.3
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: test_db
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
      TZ: Asia/Shanghai
    ports:
      - "0.0.0.0:3308:3306"
    volumes:
      # 挂载初始化脚本目录
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
      # 持久化数据
      - mysql_8.3_data:/var/lib/mysql
      # 挂载慢查询日志目录
      - ./docker/mysql/logs:/var/log/mysql-8.3
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      # 启用 InnoDB 锁日志
      - --innodb-status-output=ON
      - --innodb-status-output-locks=ON
      # 打印所有死锁信息到错误日志
      - --innodb-print-all-deadlocks=ON
      # 锁等待超时时间（秒，默认 50）
      - --innodb-lock-wait-timeout=50
      # 启用错误日志并指定路径
      - --log-error=/var/log/mysql/error-8.3.log
      # 启用错误日志详细输出
      - --log-error-verbosity=3
      # 启用慢查询日志
      - --slow-query-log=1
      - --long-query-time=1
      - --slow-query-log-file=/var/log/mysql/slow-query-8.3.log
      # 记录未使用索引的查询
      - --log-queries-not-using-indexes=1
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5

